version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    # Linters supplémentaires (#11) — choisis pour leur signal, sans bruit :
    - bodyclose # ferme les http.Response.Body
    - errorlint # erreurs comparées avec ==/!= au lieu de errors.Is/As
    - unconvert # conversions de types redondantes
    - unparam # paramètres/retours de fonction inutilisés
    # Non activés volontairement :
    #   - misspell : faux positifs massifs sur le code bilingue FR (conflit, individuel…)
    #   - revive   : règle exported-comment trop bruyante sur les mocks de test
  exclusions:
    # Ne pas analyser le code Go vendored sous le frontend (node_modules).
    paths:
      - frontend/node_modules
    rules:
      # Le code de test peut ignorer certaines erreurs (ex. defer Close) et avoir
      # des paramètres non variables (signatures imposées par les interfaces mockées).
      - path: _test\.go
        linters:
          - errcheck
          - unparam

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - frontend/node_modules

output:
  sort-order:
    - file

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
